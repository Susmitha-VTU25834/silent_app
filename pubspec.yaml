name: smart_silent_map
description: A Smart Map-Based Silent Mode App using Custom Geofencing.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Maps
  flutter_map: ^6.1.0
  flutter_map_cancellable_tile_provider: ^2.0.0
  latlong2: ^0.9.0
  
  # Location & Permissions
  geolocator: ^10.1.0
  permission_handler: ^11.3.0
  
  # Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  
  # State Management
  provider: ^6.1.1
  
  # Background Service
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.0.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  http: ^1.2.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^6.2.1
  silent_mode:
    path: ./silent_mode

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
